[build]
  command = "npm run build && npm run generate-pdf"
  publish = "dist"

[build.environment]
  PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
  PUPPETEER_EXECUTABLE_PATH = "/usr/bin/chromium-browser"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Exclude print route from sitemap/indexing
[[headers]]
  for = "/natpaper-print"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"