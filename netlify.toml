[build]
  command = "npm run build && npm run generate-pdf"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
  PUPPETEER_EXECUTABLE_PATH = "/usr/bin/chromium-browser"

# Generate PDF on all deploys including previews
[context.production]
  command = "npm run build && npm run generate-pdf"

[context.deploy-preview]
  command = "npm run build && npm run generate-pdf"

[context.branch-deploy]
  command = "npm run build && npm run generate-pdf"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Exclude print route from sitemap/indexing
[[headers]]
  for = "/natpaper-print"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"